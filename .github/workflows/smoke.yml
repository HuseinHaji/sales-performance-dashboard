name: Smoke Test

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt || true
      - name: Start Streamlit app
        run: |
          source .venv/bin/activate
          nohup streamlit run src/app.py --server.port 8501 --server.headless true > /tmp/streamlit.log 2>&1 &
          sleep 3
      - name: Health check
        run: |
          curl -sSf http://127.0.0.1:8501 || (cat /tmp/streamlit.log && false)
